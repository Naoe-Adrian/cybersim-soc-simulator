<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSim SOC Platform</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo"><i class="fas fa-shield-halved"></i></div>
    <div class="loading-text">CyberSim SOC</div>
    <div class="loading-bar"><div class="loading-progress" id="loadingProgress"></div></div>
    <div id="loadingStatus">Loading SOC telemetry...</div>
  </div>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-mark"><i class="fas fa-shield-halved"></i></div>
        <div>
          <div class="brand-title">CyberSim SOC</div>
          <div class="brand-subtitle">Triage Simulator</div>
        </div>
      </div>

      <nav class="nav-menu">
        <section class="nav-section">
          <div class="nav-section-title">Dashboard</div>
          <a class="nav-item active" href="#" data-view="overview"><i class="fas fa-gauge-high"></i><span>Overview</span></a>
        </section>

        <section class="nav-section">
          <div class="nav-section-title">Incidents</div>
          <a class="nav-item" href="#" data-view="incidents">
            <i class="fas fa-triangle-exclamation"></i><span>Active Incidents</span><span class="badge" id="activeIncidentsBadge">0</span>
          </a>
          <a class="nav-item" href="#" data-view="threat-feed"><i class="fas fa-rss"></i><span>Threat Feed</span></a>
        </section>

        <section class="nav-section">
          <div class="nav-section-title">Investigation</div>
          <a class="nav-item" href="#" data-view="forensics"><i class="fas fa-magnifying-glass-chart"></i><span>Digital Forensics</span></a>
          <a class="nav-item" href="#" data-view="threat-hunting"><i class="fas fa-crosshairs"></i><span>Threat Hunting</span></a>
          <a class="nav-item" href="#" data-view="rule-tuning"><i class="fas fa-code"></i><span>Rule Tuning</span></a>
          <a class="nav-item" href="#" data-view="intel"><i class="fas fa-brain"></i><span>Threat Intel</span></a>
        </section>

        <section class="nav-section">
          <div class="nav-section-title">Response</div>
          <a class="nav-item" href="#" data-view="playbooks"><i class="fas fa-book-open"></i><span>Playbooks</span></a>
          <a class="nav-item" href="#" data-view="containment"><i class="fas fa-lock"></i><span>Containment</span></a>
          <a class="nav-item" href="#" data-view="recovery"><i class="fas fa-rotate-left"></i><span>Recovery</span></a>
        </section>

        <section class="nav-section">
          <div class="nav-section-title">Analytics</div>
          <a class="nav-item" href="#" data-view="analytics"><i class="fas fa-chart-line"></i><span>Analytics</span></a>
          <a class="nav-item" href="#" data-view="reports"><i class="fas fa-file-lines"></i><span>Reports</span></a>
        </section>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <button class="icon-button mobile-only" id="menuToggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
        <div class="system-status"><span class="status-dot"></span><span>Telemetry live</span></div>
        <div class="topbar-right">
          <label class="sim-toggle"><input type="checkbox" id="simulationToggle" checked> Auto alerts</label>
          <span id="currentDateTime"></span>
          <div class="user-chip"><span class="avatar">L2</span><span>SOC Analyst L2</span></div>
        </div>
      </header>

      <section class="workspace" id="mainContent"></section>
    </main>
  </div>

  <div class="notification" id="notificationTemplate">
    <button class="notification-close" id="notificationClose" aria-label="Close notification"><i class="fas fa-xmark"></i></button>
    <div class="notification-title"></div>
    <div class="notification-body"></div>
  </div>

  <script type="module" src="src/index.js"></script>
</body>
</html>
